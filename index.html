<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkView-Doc</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2>文件選單</h2>
      </div>
      <nav id="sidebar-nav" class="sidebar-nav"></nav>
    </aside>

    <div id="overlay" class="overlay"></div>

    <div class="container">
      <header>
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="開啟選單">
          <span class="hamburger">☰</span>
        </button>
        <h1>MarkView-Doc</h1>
        <button id="theme-toggle" class="theme-toggle" aria-label="切換主題">
          <span class="theme-icon">☀️</span>
        </button>
      </header>

      <main>
        <div class="content-wrapper">
          <aside id="toc-sidebar" class="toc-sidebar">
            <div class="toc-header">目錄</div>
            <nav id="toc-nav"></nav>
          </aside>
          <div id="content">
            <div class="loading">載入中...</div>
          </div>
        </div>
      </main>

      <footer>
        <p><a href="https://github.com/EvanLin1704/MarkView-Doc" target="_blank" rel="noopener noreferrer">MarkView-Doc v2.0.0</a></p>
      </footer>
    </div>

    <script src="assets/marked.min.js"></script>
    <link rel="stylesheet" href="assets/prism.css" />
    <script src="assets/prism.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
